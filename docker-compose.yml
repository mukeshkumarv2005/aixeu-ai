version: "3.8"

name: aevix-prod

services:
  # ── PostgreSQL Database ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:16-pgdg-alpine
    container_name: aevix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aevix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-aevix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-aevix}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    networks:
      - aevix-network

  # ── Redis Cache / Rate Limiter ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aevix-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - aevix-network

  # ── Backend Web API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: aevix-backend:latest
    container_name: aevix-backend
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-aevix}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aevix}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ASYNC_WORKERS=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - aevix_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
    networks:
      - aevix-network

  # ── Background Worker ─────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: aevix-backend:latest
    container_name: aevix-worker
    restart: unless-stopped
    command: python -m app.worker
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-aevix}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aevix}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ASYNC_WORKERS=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - aevix_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
    networks:
      - aevix-network

  # ── Frontend SPA ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: aevix-frontend:latest
    container_name: aevix-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - aevix-network

  # ── Gateway Nginx Reverse Proxy ──────────────────────────────
  nginx:
    image: nginxinc/nginx-unprivileged:alpine-slim
    container_name: aevix-nginx
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - aevix-network

volumes:
  postgres_data:
  redis_data:
  aevix_storage:

networks:
  aevix-network:
    driver: bridge
